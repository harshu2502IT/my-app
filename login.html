<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MediStore – Login</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #f0f4f8; font-family: sans-serif; }
    .card { background: #fff; border: 1px solid #e2e8f0; border-radius: 16px; padding: 2.5rem 2rem; width: 100%; max-width: 400px; }
    .logo { width: 48px; height: 48px; background: #0EA5E9; border-radius: 12px; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.25rem; }
    .logo i { color: #fff; font-size: 24px; }
    h2 { text-align: center; font-size: 22px; font-weight: 700; color: #0f172a; margin-bottom: 0.2rem; }
    .subtitle { text-align: center; font-size: 13px; color: #64748b; margin-bottom: 1rem; }
    .badge { display: flex; align-items: center; gap: 5px; background: #EFF6FF; color: #1D4ED8; font-size: 11px; font-weight: 500; padding: 4px 12px; border-radius: 20px; width: fit-content; margin: 0 auto 1.5rem; }
    .tabs { display: flex; background: #f1f5f9; border-radius: 8px; padding: 3px; margin-bottom: 1.5rem; gap: 3px; }
    .tab { flex: 1; padding: 8px; border: none; background: transparent; border-radius: 6px; font-size: 13px; font-weight: 500; cursor: pointer; color: #64748b; transition: all 0.15s; }
    .tab.active { background: #fff; color: #0EA5E9; border: 1px solid #e2e8f0; }
    label { display: block; font-size: 12px; font-weight: 500; color: #475569; margin-bottom: 5px; }
    .field { margin-bottom: 0.9rem; }
    .input-wrap { position: relative; }
    .input-wrap i { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); font-size: 15px; color: #94a3b8; pointer-events: none; }
    input[type=email], input[type=password] { width: 100%; padding: 10px 12px 10px 36px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 14px; color: #0f172a; outline: none; background: #fff; }
    input:focus { border-color: #0EA5E9; box-shadow: 0 0 0 3px rgba(14,165,233,0.12); }
    .btn { width: 100%; padding: 11px; background: #0EA5E9; color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 0.5rem; }
    .btn:hover { background: #0284C7; }
    .secure-note { display: flex; align-items: center; justify-content: center; gap: 5px; font-size: 11px; color: #64748b; margin-top: 1rem; }
    .secure-note i { color: #22c55e; font-size: 13px; }
    .msg { margin-top: 1rem; padding: 10px 14px; border-radius: 8px; font-size: 13px; text-align: center; display: none; }
    .msg.error { background: #FEF2F2; color: #b91c1c; display: block; }
    .msg.success { background: #F0FDF4; color: #15803d; display: block; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo"><i class="ti ti-heart-rate-monitor"></i></div>
    <h2>MediStore</h2>
    <p class="subtitle">Secure medical records management</p>
    <div class="badge"><i class="ti ti-shield-check"></i> HIPAA Compliant</div>

    <div class="tabs">
      <button class="tab active" onclick="setTab('login', this)">Login</button>
      <button class="tab" onclick="setTab('signup', this)">Sign Up</button>
    </div>

    <div id="login-form">
      <div class="field">
        <label>Email address</label>
        <div class="input-wrap">
          <i class="ti ti-mail"></i>
          <input type="email" id="login-email" placeholder="doctor@hospital.com" />
        </div>
      </div>
      <div class="field">
        <label>Password</label>
        <div class="input-wrap">
          <i class="ti ti-lock"></i>
          <input type="password" id="login-password" placeholder="••••••••" />
        </div>
      </div>
      <button class="btn" onclick="login()">Sign in securely</button>
    </div>

    <div id="signup-form" style="display:none">
      <div class="field">
        <label>Email address</label>
        <div class="input-wrap">
          <i class="ti ti-mail"></i>
          <input type="email" id="signup-email" placeholder="doctor@hospital.com" />
        </div>
      </div>
      <div class="field">
        <label>Password</label>
        <div class="input-wrap">
          <i class="ti ti-lock"></i>
          <input type="password" id="signup-password" placeholder="Min. 6 characters" />
        </div>
      </div>
      <button class="btn" onclick="signup()">Create secure account</button>
    </div>

    <p class="msg" id="msg"></p>
    <div class="secure-note"><i class="ti ti-lock"></i> Your data is encrypted and secure</div>
  </div>

  <script src="auth.js"></script>
  <script>
    function setTab(t, el) {
      document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'))
      el.classList.add('active')
      document.getElementById('login-form').style.display = t === 'login' ? 'block' : 'none'
      document.getElementById('signup-form').style.display = t === 'signup' ? 'block' : 'none'
      document.getElementById('msg').className = 'msg'
    }

    async function login() {
      const email = document.getElementById('login-email').value
      const password = document.getElementById('login-password').value
      const msg = document.getElementById('msg')
      const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password })
      if (error) { msg.textContent = error.message; msg.className = 'msg error' }
      else { localStorage.setItem('token', data.session.access_token); window.location.href = 'dashboard.html' }
    }

    async function signup() {
      const email = document.getElementById('signup-email').value
      const password = document.getElementById('signup-password').value
      const msg = document.getElementById('msg')
      const { data, error } = await supabaseClient.auth.signUp({ email, password })
      if (error) { msg.textContent = error.message; msg.className = 'msg error' }
      else { msg.textContent = 'Account created! You can now log in.'; msg.className = 'msg success' }
    }
  </script>
</body>
</html>
